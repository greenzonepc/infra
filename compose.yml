services:
  managment:
    image: ghcr.io/greenzonepc/managment:latest
    # platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      IMAGES_DIR: /data/images
    env_file: .env
    volumes:
      - images_data:/data/images
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/greenzonepc/frontend:latest
    # platform: linux/amd64
    env_file: .env
    environment:
      PORT: 3000
      API_URL: http://managment:8080

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: greenzonepc.com
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - images_data:/usr/share/nginx/html/images:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    # Reload periodically so renewed certificates are picked up without downtime.
    command: /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"
    depends_on:
      managment:
        condition: service_started
      certbot:
        condition: service_healthy
    restart: unless-stopped

  certbot:
    build: ./certbot
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      DOMAIN: greenzonepc.com
      CERTBOT_EMAIL: cicero956@gmail.com
    volumes:
      - ./certbot/entrypoint.sh:/entrypoint.sh:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    healthcheck:
      # nginx waits on this so it never starts without a certificate on disk.
      test: ["CMD-SHELL", "test -f /etc/letsencrypt/live/greenzonepc.com/fullchain.pem"]
      interval: 5s
      timeout: 5s
      retries: 24
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenzonepc -d greenzonepc"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  images_data:
  certbot_conf:
  certbot_www:
