version: '3.8'

services:
  managment:
    image: ghcr.io/greenzonepc/managment:latest
    platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      IMAGES_DIR: /data/images
    env_file: .env
    volumes:
      - images_data:/data/images
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/greenzonepc/frontend:latest
    # platform: linux/amd64
    env_file: .env
    environment:
      API_URL: http://managment:8080

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - images_data:/usr/share/nginx/html/images:ro
    depends_on:
      - managment
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: greenzonepc
      POSTGRES_USER: greenzonepc
      POSTGRES_PASSWORD: greenzonepc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenzonepc -d greenzonepc"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  images_data:
